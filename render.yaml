services:
  - type: web
    name: anixcart-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://anixcart.netlify.app"
      - key: DATABASE_URL
        fromDatabase:
          name: anixcart-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: anixcart-db
    databaseName: anixcart
    user: anixcart
